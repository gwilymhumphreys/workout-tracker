<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark light">
<title>Gym Queue</title>
<style>
  :root {
    --bg: #121417;
    --card: #1e2228;
    --card-press: #2a3038;
    --text: #e8eaed;
    --muted: #9aa0a8;
    --accent: #4cc38a;
    --border: #2c313a;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --card-press: #e8ebef;
      --text: #1a1d21;
      --muted: #6b7280;
      --accent: #14804a;
      --border: #dde0e5;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding: max(16px, env(safe-area-inset-top)) 16px max(24px, env(safe-area-inset-bottom));
    max-width: 480px;
    margin: 0 auto;
    -webkit-tap-highlight-color: transparent;
  }
  #queue { display: flex; flex-direction: column; gap: 12px; }
  .exercise {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 18px;
    cursor: pointer;
    color: var(--text);
    font: inherit;
    transition: transform 0.08s ease, background 0.08s ease;
    touch-action: manipulation;
  }
  .exercise:active {
    background: var(--card-press);
    transform: scale(0.98);
  }
  .exercise .name {
    font-size: 1.25rem;
    font-weight: 600;
    line-height: 1.3;
  }
  .exercise .last {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .exercise.top {
    border-color: var(--accent);
  }
  .exercise.top .name::before {
    content: "▸ ";
    color: var(--accent);
  }
  #stopwatch {
    margin-top: 28px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  #sw-time {
    text-align: center;
    font-size: 4.5rem;
    font-weight: 600;
    line-height: 1.1;
    margin-bottom: 14px;
  }
  #sw-time span { display: inline-block; text-align: center; }
  #sw-time .d { width: 0.62em; }
  #sw-time .s { width: 0.3em; }
  #sw-buttons {
    display: flex;
    gap: 12px;
  }
  #sw-buttons button {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 0;
    font: inherit;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--text);
    background: var(--card);
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.08s ease, background 0.08s ease;
  }
  #sw-buttons button:active {
    background: var(--card-press);
    transform: scale(0.98);
  }
  #sw-reset { flex: 1; }
  #sw-toggle { flex: 2; border-color: var(--accent); color: var(--accent); }
  #sw-toggle.running { background: var(--accent); color: #fff; }
  #done-flash {
    position: fixed;
    left: 50%;
    bottom: 48px;
    transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    padding: 10px 22px;
    border-radius: 999px;
    font-weight: 600;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
  }
  #done-flash.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>
<div id="queue"></div>
<div id="stopwatch">
  <div id="sw-time">0.0</div>
  <div id="sw-buttons">
    <button type="button" id="sw-reset">Reset</button>
    <button type="button" id="sw-toggle">Start</button>
  </div>
</div>
<div id="done-flash">Done ✓</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "gym-queue-v1";
  var QUEUE_SIZE = 4;
  var DAY_MS = 24 * 60 * 60 * 1000;

  // id must be stable across versions — lastDone timestamps are keyed on it.
  var EXERCISES = [
    { id: "calf-raises",   name: "Calf raises",           weight: 3 },
    { id: "copenhagen",    name: "Copenhagen planks",     weight: 2 },
    { id: "reverse-lunge", name: "Reverse lunges",        weight: 1 },
    { id: "nordic-iso",    name: "Nordic isometric hold", weight: 1 }
  ];

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return {};
      var parsed = JSON.parse(raw);
      return (parsed && typeof parsed === "object") ? parsed : {};
    } catch (e) {
      return {};
    }
  }

  function saveState(state) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { /* private browsing may block writes; queue still works for the session */ }
  }

  var state = loadState(); // { [id]: lastDoneTimestampMs }

  function dueness(ex, now) {
    var last = state[ex.id];
    if (!last) return Infinity;
    return (now - last) * ex.weight;
  }

  function daysAgoLabel(ts, now) {
    if (!ts) return "never";
    var days = Math.floor((now - ts) / DAY_MS);
    if (days <= 0) return "today";
    if (days === 1) return "1 day ago";
    return days + " days ago";
  }

  function sortedQueue() {
    var now = Date.now();
    // Repeat the exercise list until we have at least QUEUE_SIZE entries,
    // projecting future dueness for repeats so the order stays sensible.
    var sorted = EXERCISES.slice().sort(function (a, b) {
      var da = dueness(a, now), db = dueness(b, now);
      if (da === db) return b.weight - a.weight;
      return db - da; // most due first (Infinity = never done sorts to top)
    });
    var queue = [];
    var round = 0;
    while (queue.length < QUEUE_SIZE) {
      for (var i = 0; i < sorted.length && queue.length < QUEUE_SIZE; i++) {
        queue.push(sorted[i]);
      }
      round++;
      if (round > QUEUE_SIZE) break;
    }
    return queue;
  }

  function markDone(id) {
    state[id] = Date.now();
    saveState(state);
    render();
    flash();
  }

  var flashTimer = null;
  function flash() {
    var el = document.getElementById("done-flash");
    el.classList.add("show");
    clearTimeout(flashTimer);
    flashTimer = setTimeout(function () { el.classList.remove("show"); }, 1200);
  }

  function render() {
    var now = Date.now();
    var container = document.getElementById("queue");
    container.textContent = "";
    sortedQueue().forEach(function (ex, index) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "exercise" + (index === 0 ? " top" : "");

      var name = document.createElement("div");
      name.className = "name";
      name.textContent = ex.name;

      var last = document.createElement("div");
      last.className = "last";
      last.textContent = "last done: " + daysAgoLabel(state[ex.id], now);

      btn.appendChild(name);
      btn.appendChild(last);
      btn.addEventListener("click", function () { markDone(ex.id); });
      container.appendChild(btn);
    });
  }

  // --- Stopwatch ---
  var swElapsed = 0;       // accumulated ms while paused
  var swStartedAt = null;  // timestamp of current run, or null if stopped
  var swTimer = null;
  var swTimeEl = document.getElementById("sw-time");
  var swToggleEl = document.getElementById("sw-toggle");

  function swNow() {
    return swElapsed + (swStartedAt ? Date.now() - swStartedAt : 0);
  }

  function swFormat(ms) {
    var tenths = Math.floor(ms / 100) % 10;
    var totalSec = Math.floor(ms / 1000);
    var sec = totalSec % 60;
    var min = Math.floor(totalSec / 60);
    if (min < 1) return sec + "." + tenths;
    return min + ":" + (sec < 10 ? "0" : "") + sec + "." + tenths;
  }

  function swRender() {
    var text = swFormat(swNow());
    swTimeEl.textContent = "";
    for (var i = 0; i < text.length; i++) {
      var ch = document.createElement("span");
      ch.className = (text[i] >= "0" && text[i] <= "9") ? "d" : "s";
      ch.textContent = text[i];
      swTimeEl.appendChild(ch);
    }
  }

  swToggleEl.addEventListener("click", function () {
    if (swStartedAt) {
      swElapsed = swNow();
      swStartedAt = null;
      clearInterval(swTimer);
      swToggleEl.textContent = "Start";
      swToggleEl.classList.remove("running");
      swRender();
    } else {
      swStartedAt = Date.now();
      swTimer = setInterval(swRender, 100);
      swToggleEl.textContent = "Stop";
      swToggleEl.classList.add("running");
    }
  });

  document.getElementById("sw-reset").addEventListener("click", function () {
    swElapsed = 0;
    if (swStartedAt) swStartedAt = Date.now();
    swRender();
  });

  // Refresh "days ago" labels when the tab is reopened on a later day.
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) render();
  });

  render();
  swRender();
})();
</script>
</body>
</html>
